                            <li id="b" value="1B" class="letras"></li>
                            <li id="c" value="1C" class="letras"></li>
                            <li id="d" value="1D" class="letras"></li>

                    <footer id="aviso" class="rodapeQuestao centro">
                        <span id="numero"></span>

                    </footer>
                </article>
