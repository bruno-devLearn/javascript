<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Aula 26 de JS</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main class="tela-principal">
            <!-- Janela Modal -->
            <div id="abrirModal" class="modal">
                <div>
                    <button id="fechar" title="Fechar" class="fechar">x</button>
                    <h2>Aviso</h2>
                    <p>
                        É obrigatório escolher uma data, digitar uma citação e
                        autoria antes de postar.
                    </p>
                </div>
            </div>

            <section class="sectionForm">
                <h1>App Mensagem do Dia</h1>

                <p id="aviso">Seu app de mensagem do dia</p>

                <form id="formulario">
                    <div class="form-group">
                        <label for="data">Data</label>
                        <input type="date" name="data" id="data" required />
                    </div>

                    <div class="form-group">
                        <label for="citacao">Citação</label>
                        <textarea
                            rows="3"
                            name="citacao"
                            id="citacao"
                            autofocus
                            placeholder="Digite aqui a citação"
                            required
                        ></textarea>
                    </div>

                    <div class="form-group">
                        <label for="autoria">Autoria</label>
                        <input type="text" name="autoria" id="autoria" />
                    </div>

                    <div id="divBotoes" class="form-group">
                        <button type="button" id="btnCriar" class="btn">
                            Criar
                        </button>
                        <button type="reset" id="btnLimpar" class="btn">
                            Limpar
                        </button>
                    </div>
                </form>
            </section>

            <section class="conteudos">
                <article id="citacao00" class="citacao fundo1">
                    <span id="data-quote"></span>
                    <p id="title"></p>
                    <blockquote id="text"></blockquote>
                    <span id="autor"></span>
                </article>
                <button class="baixar">Baixar Imagem</button>
            </section>
        </main>

        <!-- Incluindo a biblioteca html2canvas -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script type="module" src="ex15.js"></script>
    </body>
</html>
